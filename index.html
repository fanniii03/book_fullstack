<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <title>Books API client - gyakorló</title>
    <style>
        body { margin: 30px; }

        .parent {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: 1fr;
            grid-column-gap: 0;
            grid-row-gap: 0;
        }

        .div1 { grid-area: 1 / 1 / 2 / 2; }
        .div2 { grid-area: 1 / 2 / 2 / 3; }

        .div1, .div2 {
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Books API client (gyakorló)</h1>
    <hr>

    <div class="parent">
        <div class="div1">
            <input type="text" id="book-id" disabled class="form-control mb-3" placeholder="Book id">
            <input type="text" id="book-title" class="form-control mb-3" placeholder="Book title">
            <input type="text" id="book-author" class="form-control mb-3" placeholder="Book author">
            <input type="text" id="book-year" class="form-control mb-3" placeholder="Publish year">
            <button onclick="updateBook()" class="btn btn-sm btn-primary">Update</button>
            <button onclick="resetForm()" class="btn btn-sm btn-primary">Reset</button>
        </div>
        <div class="div2">
            <input type="text" id="create-book-id" disabled class="form-control mb-3" placeholder="Book id">
            <input type="text" id="create-book-title" class="form-control mb-3" placeholder="Book title">
            <input type="text" id="create-book-author" class="form-control mb-3" placeholder="Book author">
            <input type="text" id="create-book-year" class="form-control mb-3" placeholder="Publish year">
            <button onclick="createBook()" class="btn btn-sm btn-success">Add</button>
            <button onclick="addTemp()" class="btn btn-sm btn-secondary">Fill with temp</button>
        </div>
    </div>

    <hr>
    <h3>Books:</h3>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Year</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="books"></tbody>
    </table>

    <script src="main.js"></script>
</body>
</html>
